{% extends 'attendance/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>{{ title }}</h3>
  <div class="btn-group">
    {% if report_date %}
    <a class="btn btn-outline-secondary btn-sm" href="?{% if request.GET.date %}date={{ request.GET.date }}&{% endif %}export=pdf">PDF</a>
    <a class="btn btn-outline-secondary btn-sm" href="?{% if request.GET.date %}date={{ request.GET.date }}&{% endif %}export=excel">Excel</a>
    {% endif %}
  </div>
</div>
<div class="card">
  <div class="table-responsive">
    <table class="table mb-0">
      <thead>
        <tr>
          {% for cell in rows.0 %}<th>{{ cell }}</th>{% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in rows|slice:"1:" %}
        <tr>{% for cell in row %}<td>{{ cell }}</td>{% endfor %}</tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
