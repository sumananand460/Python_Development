{% extends 'attendance/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Classes</h3>
  <a class="btn btn-primary" href="{% url 'class_create' %}">Add Class</a>
</div>
<div class="card"><div class="table-responsive">
<table class="table mb-0">
  <thead><tr><th>Class</th><th>Section</th><th>Actions</th></tr></thead>
  <tbody>
    {% for cls in classes %}
    <tr>
      <td>{{ cls.class_name }}</td><td>{{ cls.section }}</td>
      <td>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'class_update' cls.id %}">Edit</a>
        <a class="btn btn-sm btn-outline-danger" href="{% url 'class_delete' cls.id %}">Delete</a>
      </td>
    </tr>
    {% empty %}<tr><td colspan="3" class="text-center text-muted">No classes.</td></tr>{% endfor %}
  </tbody>
</table>
</div></div>
{% endblock %}
