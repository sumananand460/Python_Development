{% extends 'attendance/base.html' %}
{% block content %}
<h3 class="mb-3">Attendance History</h3>
<div class="card">
  <div class="table-responsive">
    <table class="table mb-0">
      <thead><tr><th>Student</th><th>Date</th><th>Status</th></tr></thead>
      <tbody>
        {% for record in page_obj %}
        <tr><td>{{ record.student.full_name }}</td><td>{{ record.date }}</td><td>{{ record.status }}</td></tr>
        {% empty %}<tr><td colspan="3" class="text-center text-muted">No records.</td></tr>{% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
